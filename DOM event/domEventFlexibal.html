<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component</title>
</head>
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Create a reusable Button component that can render either a link or a button depending on props-->
<body>
    <div id="root">

    </div>
  <script type="text/babel">
    function Button({href, onClick}){
        let Component = 'button';
        let props = {};
        if(href){
            Component = 'a'
            props.href = href
        }
        if(onClick){
            props.onClick = onClick
        }
        return (
            <Component {...props}>Click me hehe</Component>
        )
    }
    function App(){
        return(
            <Button
                href = "https://fonts.google.com/"
                onClick = {()=>{console.log(Math.round(Math.random()*10)+1)}}
            ></Button>
        )
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
</script>
</body>
</html>
